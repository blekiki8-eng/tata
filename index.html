<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рибалка Віті</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0a3d62, #1e90ff);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            padding: 15px 0;
            font-size: 26px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
        }
        .score {
            font-size: 32px;
            margin: 10px 0;
            font-weight: bold;
        }
        .energy {
            font-size: 24px;
            margin: 5px 0 20px 0;
        }
        #tap-area {
            width: 260px;
            height: 260px;
            margin: 30px auto;
            background: radial-gradient(circle, #ffeb3b, #ff9800);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 130px;
            cursor: pointer;
            transition: transform 0.08s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            user-select: none;
        }
        #tap-area:active {
            transform: scale(0.85);
        }

        /* Вкладки */
        .tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 0;
            z-index: 100;
        }
        .tab {
            flex: 1;
            padding: 16px 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .tab.active {
            background: #ff9800;
            color: black;
            border-radius: 10px;
            margin: 0 6px;
        }

        /* Контент вкладок */
        .screen {
            display: none;
            padding: 20px;
            padding-bottom: 90px;
        }
        .screen.active {
            display: block;
        }

        button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 14px 28px;
            margin: 15px 5px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
        }
        .message {
            position: absolute;
            font-size: 26px;
            color: #ffeb3b;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1.8s forwards;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-140px); }
        }
    </style>
</head>
<body>

    <div class="header">🎣 Рибалка Віті</div>

    <!-- Екран Тапати -->
    <div id="screen-tap" class="screen active">
        <div class="score">Улов: <span id="score">0</span> РибКоінів</div>
        <div class="energy">Енергія: <span id="energy">100</span>/100</div>
        <div id="tap-area">🐠</div>
    </div>

    <!-- Екран Profile -->
    <div id="screen-profile" class="screen">
        <h2>👤 Профіль</h2>
        <p>Улов: <strong><span id="profile-score">0</span></strong> РибКоінів</p>
        <p>Енергія: <strong><span id="profile-energy">100</span></strong>/100</p>
        <p>Рівень рибалки: <strong>Початківець</strong></p>
        <button onclick="alert('Поки що нічого немає. Буде пізніше.')">Статистика</button>
    </div>

    <!-- Екран Rewards -->
    <div id="screen-rewards" class="screen">
        <h2>🏆 Нагороди</h2>
        <p>Тут будуть завдання та бонуси</p>
        <button onclick="alert('Щоденний бонус тимчасово вимкнено')">Щоденний бонус</button>
        <button onclick="alert('Реферали скоро з\'являться')">Запросити друга</button>
    </div>

    <!-- Вкладки внизу -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">Тапати</div>
        <div class="tab" onclick="switchTab(1)">Profile</div>
        <div class="tab" onclick="switchTab(2)">Rewards</div>
    </div>

    <script>
        let score = 0;
        let energy = 100;

        // Завантаження збереженого балансу
        function loadProgress() {
            const savedScore = localStorage.getItem('rybalkaScore');
            const savedEnergy = localStorage.getItem('rybalkaEnergy');
            
            if (savedScore) score = parseInt(savedScore);
            if (savedEnergy) energy = parseInt(savedEnergy);
            
            updateAllScores();
        }

        // Збереження прогресу
        function saveProgress() {
            localStorage.setItem('rybalkaScore', score);
            localStorage.setItem('rybalkaEnergy', energy);
        }

        function updateAllScores() {
            document.getElementById('score').textContent = score;
            document.getElementById('profile-score').textContent = score;
            document.getElementById('energy').textContent = energy;
            document.getElementById('profile-energy').textContent = energy;
        }

        const tapArea = document.getElementById('tap-area');

        tapArea.addEventListener('click', (e) => {
            if (energy <= 0) {
                alert("⚠️ Енергія закінчилася! Зачекай трохи 🎣");
                return;
            }

            score += 2;
            energy -= 1;

            updateAllScores();
            createFloatingText(e.clientX, e.clientY + window.scrollY, '+2');
            saveProgress();
        });

        function createFloatingText(x, y, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.textContent = text;
            msg.style.left = x + 'px';
            msg.style.top = y + 'px';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1800);
        }

        // Відновлення енергії
        setInterval(() => {
            if (energy < 100) {
                energy = Math.min(100, energy + 1);
                updateAllScores();
                saveProgress();
            }
        }, 3000);

        // Перемикання вкладок
        function switchTab(tabIndex) {
            document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            
            if (tabIndex === 0) {
                document.getElementById('screen-tap').classList.add('active');
            } else if (tabIndex === 1) {
                document.getElementById('screen-profile').classList.add('active');
            } else if (tabIndex === 2) {
                document.getElementById('screen-rewards').classList.add('active');
            }
            
            document.querySelectorAll('.tab')[tabIndex].classList.add('active');
        }

        // Ініціалізація
        window.onload = () => {
            loadProgress();
        };
    </script>
</body>
</html>
