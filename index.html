<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Cash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #ffcc00;
            --bg-color: #1a2a3a;
            --card-bg: #2c3e50;
            --accent-color: #0088cc;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tab-content {
            flex: 1;
            display: none;
            padding: 20px;
            overflow-y: auto;
            align-items: center;
            flex-direction: column;
        }

        .active { display: flex; }

        /* Стильний Профіль */
        .profile-container {
            width: 100%;
            max-width: 320px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .balance-row:last-child { border-bottom: none; }

        /* Поля вводу та кнопки */
        .input-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 10px;
            color: white;
            outline: none;
        }

        .btn-small {
            background: var(--accent-color);
            border: none;
            border-radius: 10px;
            color: white;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 12px;
        }

        .ref-box {
            background: rgba(255, 204, 0, 0.1);
            border: 1px dashed var(--primary-color);
            padding: 10px;
            border-radius: 10px;
            font-size: 11px;
            word-break: break-all;
            margin-top: 10px;
            color: #ffcc00;
        }

        /* Ринок */
        .glamour-text {
            font-size: 40px;
            font-weight: 900;
            background: linear-gradient(45deg, #ffcc00, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
            margin-top: 50px;
            letter-spacing: 5px;
        }

        /* Кнопка гри */
        .game-btn {
            background: linear-gradient(180deg, #f39c12 0%, #d35400 100%);
            color: white; border: none;
            padding: 18px; border-radius: 50px;
            font-size: 20px; font-weight: bold;
            width: 100%; cursor: pointer;
            box-shadow: 0 4px 0 #a04000;
        }

        /* Навігація */
        .nav-bar { display: flex; background: #121c26; padding-bottom: 25px; border-top: 1px solid #2c3e50; }
        .nav-item { flex: 1; padding: 15px 0; text-align: center; color: #7f8c8d; font-size: 12px; }
        .active-nav { color: var(--primary-color); }
    </style>
</head>
<body>

    <div id="profile" class="tab-content">
        <div class="profile-container">
            <div class="profile-header">
                <h2 style="margin: 0; color: var(--primary-color);">ПРОФІЛЬ</h2>
                <code style="font-size: 12px; opacity: 0.5;">ID: <span id="user-id">---</span></code>
            </div>

            <div class="stat-card">
                <h3 id="user-name" style="margin-top: 0; text-align: center;">Рибалка</h3>
                <div class="balance-row">
                    <span>💰 Fish Coins:</span>
                    <span id="balance" style="font-weight: bold; color: var(--primary-color);">100</span>
                </div>
                <div class="balance-row">
                    <span>💎 DFC:</span>
                    <span id="dfc-balance" style="font-weight: bold; color: #ff4444;">0</span>
                </div>
            </div>

            <div class="stat-card">
                <span style="font-size: 14px; font-weight: bold;">🔑 Промокод</span>
                <div class="input-group">
                    <input type="text" id="promo-input" placeholder="Введіть код...">
                    <button class="btn-small" onclick="usePromo()">OK</button>
                </div>
            </div>

            <div class="stat-card">
                <span style="font-size: 14px; font-weight: bold;">🤝 Реферальна програма</span>
                <p style="font-size: 11px; opacity: 0.7; margin: 5px 0;">Запроси друга та отримай +100 FC!</p>
                <div class="ref-box" id="ref-link">https://t.me/tata_bot?start=ref_12345</div>
                <button class="btn-small" style="width: 100%; margin-top: 10px;" onclick="copyRef()">КОПІЮВАТИ ПОСИЛАННЯ</button>
            </div>
        </div>
    </div>

    <div id="fishing" class="tab-content active">
        <h2 style="color: #3498db;">ОЗЕРО ТАТА</h2>
        <div id="lake" style="width:200px; height:200px; background:radial-gradient(circle, #3498db, #2980b9); border-radius:50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 60px;">
            <div id="bobber" style="display:none;">📍</div>
            <div id="water">🌊</div>
        </div>
        <p id="game-status" style="height:30px; font-weight:bold; color:orange;">Готовий?</p>
        <button class="game-btn" id="action-btn" onclick="handleAction()">ЗАКИНУТИ</button>
    </div>

    <div id="market" class="tab-content">
        <h2 style="color: #2ecc71;">РИНОК</h2>
        <div class="glamour-text">СКОРО</div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="changeTab('profile', this)">👤 Профіль</div>
        <div class="nav-item active-nav" onclick="changeTab('fishing', this)">🎣 Рибалка</div>
        <div class="nav-item" onclick="changeTab('market', this)">🛒 Ринок</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let coins = 100;
        let dfc = 0;
        let usedPromos = [];

        function changeTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
            document.getElementById(tabId).style.display = 'flex';
            el.classList.add('active-nav');
            tg.HapticFeedback.impactOccurred('light');
        }

        // Промокоди
        function usePromo() {
            const input = document.getElementById('promo-input');
            const code = input.value.trim().toLowerCase();

            if (code === 'open') {
                if (!usedPromos.includes('open')) {
                    coins += 200;
                    usedPromos.push('open');
                    updateUI();
                    alert("Успіх! +200 Fish Coins 🐠");
                    input.value = "";
                } else {
                    alert("Цей код вже використано!");
                }
            } else {
                alert("Невірний код!");
            }
        }

        // Рефералка
        function copyRef() {
            const link = document.getElementById('ref-link').innerText;
            const el = document.createElement('textarea');
            el.value = link;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            tg.showPopup({ message: "Посилання скопійовано! Відправ його другу." });
        }

        function updateUI() {
            document.getElementById('balance').innerText = coins;
            document.getElementById('dfc-balance').innerText = dfc;
        }

        // Логіка гри (спрощена для тесту)
        let isFishing = false;
        function handleAction() {
            const btn = document.getElementById('action-btn');
            const status = document.getElementById('game-status');
            if(!isFishing) {
                isFishing = true;
                btn.innerText = "ЧЕКАЙ...";
                status.innerText = "Риба підпливає...";
                setTimeout(() => {
                    coins += 10;
                    updateUI();
                    status.innerText = "Спіймав! +10 FC";
                    btn.innerText = "ЗАКИНУТИ";
                    isFishing = false;
                }, 2000);
            }
        }

        // Ініціалізація даних
        if (tg.initDataUnsafe?.user) {
            const user = tg.initDataUnsafe.user;
            document.getElementById('user-name').innerText = user.first_name;
            document.getElementById('user-id').innerText = user.id;
            // Динамічне посилання
            document.getElementById('ref-link').innerText = `https://t.me/tata_bot?start=ref_${user.id}`;
        }
        updateUI();
    </script>
</body>
</html>
