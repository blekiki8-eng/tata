<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #ffcc00;
            --secondary-color: #0088cc;
            --bg-color: #1a2a3a;
            --card-bg: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Контент вкладок */
        .tab-content {
            flex: 1;
            display: none;
            padding: 20px;
            text-align: center;
        }

        .active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Грові кнопки */
        .game-btn {
            background: linear-gradient(180deg, #f39c12 0%, #d35400 100%);
            color: white;
            border: 2px solid #fff;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            margin: 10px;
            width: 80%;
        }

        .game-btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* Озеро */
        #lake {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #3498db 0%, #2980b9 100%);
            border-radius: 50%;
            border: 8px solid #ecf0f1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            margin: 20px 0;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.3);
            position: relative;
        }

        .fishing-rod {
            position: absolute;
            bottom: -20px;
            right: -20px;
            transform: rotate(-15deg);
        }

        /* Статистика */
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--primary-color);
            width: 85%;
            margin-top: 20px;
        }

        /* Нижня панель */
        .nav-bar {
            display: flex;
            background-color: #121c26;
            border-top: 2px solid #2c3e50;
            padding: 10px 0;
            padding-bottom: 25px; /* для зручності на мобільних */
        }

        .nav-item {
            flex: 1;
            text-align: center;
            color: #7f8c8d;
            font-size: 12px;
        }

        .nav-item.active-nav {
            color: var(--primary-color);
        }

        .icon {
            font-size: 24px;
            display: block;
            margin-bottom: 5px;
        }

        .status-msg {
            height: 30px;
            margin-top: 10px;
            font-weight: bold;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div id="profile" class="tab-content active">
        <h2 style="color: var(--primary-color);">ПРОФІЛЬ РИБАЛКИ</h2>
        <div class="stat-card">
            <h3 id="user-name">Гість</h3>
            <hr border="0" height="1px" background="#444">
            <p style="font-size: 24px;">💰 <span id="balance">100</span> <br><small>Fish Coins</small></p>
        </div>
    </div>

    <div id="fishing" class="tab-content">
        <h2 style="color: #3498db;">ОЗЕРО ТАТА</h2>
        <div id="lake">
            🌊
            <div class="fishing-rod">🎣</div>
        </div>
        <div class="status-msg" id="game-status">Закидай вудку!</div>
        <button class="game-btn" onclick="startFishing()">ЛОВИТИ!</button>
    </div>

    <div id="market" class="tab-content">
        <h2 style="color: #2ecc71;">РИНОК</h2>
        <div class="stat-card">
            <p>Тут ти зможеш купувати нові вудки та наживку!</p>
            <p style="font-size: 14px; color: #bdc3c7;">(Розділ у розробці)</p>
            <button class="game-btn" style="background: grey; opacity: 0.5;">СКОРО</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-nav" onclick="showTab('profile', this)">
            <span class="icon">👤</span> Профіль
        </div>
        <div class="nav-item" onclick="showTab('fishing', this)">
            <span class="icon">🎣</span> Рибалка
        </div>
        <div class="nav-item" onclick="showTab('market', this)">
            <span class="icon">🛒</span> Ринок
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let coins = 100;

        function showTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active-nav'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active-nav');
        }

        function updateUI() {
            document.getElementById('balance').innerText = coins;
        }

        function startFishing() {
            const status = document.getElementById('game-status');
            const lake = document.getElementById('lake');
            
            status.innerText = "Чекаємо на клювання...";
            lake.style.transform = "scale(1.05)";
            
            setTimeout(() => {
                lake.style.transform = "scale(1)";
                const chance = Math.random() * 100;
                let result = "";
                let change = 0;

                if (chance <= 25) {
                    result = "🍾 Бутилка! (Сміття)";
                    change = -10;
                } else if (chance <= 50) {
                    result = "🛍️ Пакет! (Сміття)";
                    change = -10;
                } else if (chance <= 75) {
                    result = "🐟 Маленька рибка!";
                    change = 10;
                } else {
                    result = "🐠 Маленький карасик!";
                    change = 10;
                }

                coins += change;
                if (coins < 0) coins = 0; // Щоб не було від'ємного балансу
                
                status.innerText = `${result} [${change > 0 ? '+' : ''}${change} FC]`;
                updateUI();
                tg.HapticFeedback.notificationOccurred(change > 0 ? 'success' : 'error');
            }, 1200);
        }

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
        }
        updateUI();
    </script>
</body>
</html>
