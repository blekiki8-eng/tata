<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рибалка Віті</title>
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(to bottom, #0a3d62, #1e90ff); color: white; font-family: Arial, sans-serif; text-align: center; height: 100vh; overflow: hidden; }
        .header { padding: 15px 0; font-size: 22px; font-weight: bold; background: rgba(0,0,0,0.3); }
        .score { font-size: 34px; margin: 15px 0 5px 0; font-weight: bold; }
        .energy { font-size: 24px; margin-bottom: 25px; }
        #tap-area { width: 260px; height: 260px; margin: 20px auto; background: radial-gradient(circle, #ffeb3b, #ff9800); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 130px; cursor: pointer; transition: transform 0.08s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.4); user-select: none; }
        #tap-area:active { transform: scale(0.85); }

        .tabs { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: rgba(0,0,0,0.75); padding: 10px 0; z-index: 100; }
        .tab { flex: 1; padding: 16px 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .tab.active { background: #ff9800; color: black; border-radius: 10px; margin: 0 6px; }

        .screen { display: none; padding: 20px 15px; padding-bottom: 100px; height: calc(100vh - 70px); overflow-y: auto; }
        .screen.active { display: block; }

        button { background: #ff9800; color: white; border: none; padding: 14px 24px; margin: 12px 6px; border-radius: 12px; font-size: 17px; font-weight: bold; width: 90%; max-width: 340px; }
        .task { background: rgba(255,255,255,0.12); padding: 18px; margin: 15px auto; border-radius: 14px; max-width: 340px; text-align: left; }
    </style>
</head>
<body>

    <div id="screen-tap" class="screen active">
        <div class="score">Улов: <span id="score">0</span> РибКоінів</div>
        <div class="energy">Енергія: <span id="energy">100</span>/100</div>
        <div id="tap-area">🐠</div>
    </div>

    <div id="screen-profile" class="screen">
        <h2>👤 Профіль</h2>
        <div class="task">
            <p><strong>User ID:</strong> <span id="user-id">8694292932</span></p>
            <p><strong>Улов:</strong> <span id="profile-score">0</span> РибКоінів</p>
            <p><strong>Енергія:</strong> <span id="profile-energy">100</span>/100</p>
            <p><strong>Рівень:</strong> Початківець 🎣</p>
        </div>
    </div>

    <div id="screen-rewards" class="screen">
        <h2>🏆 Нагороди та Завдання</h2>
        
        <div class="task">
            <strong>📢 Підписатися на канал власника</strong><br><br>
            <button onclick="openChannel()">Відкрити канал @vexoo_hub</button>
            <button onclick="checkAndClaimChannel()" id="claimBtn">Перевірити підписку та отримати +498</button>
        </div>

        <div class="task">
            <strong>👥 Реферальна програма</strong><br><br>
            <button onclick="copyReferralLink()">Скопіювати реферальне посилання (+150 за друга)</button>
        </div>

        <div class="task">
            <strong>🎟 Промокод</strong><br>
            <input type="text" id="promoInput" placeholder="Введіть промокод">
            <button onclick="activatePromo()">Активувати</button>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">Тапати</div>
        <div class="tab" onclick="switchTab(1)">Profile</div>
        <div class="tab" onclick="switchTab(2)">Rewards</div>
    </div>

    <script>
        let score = 0;
        let energy = 100;
        const userId = "8694292932";
        const botUsername = "Fdicbskcb_bot";   // ← Зміни на реальний username твого бота!

        const CHANNEL_REWARD_KEY = 'channelRewardClaimed';

        function loadProgress() {
            const savedScore = localStorage.getItem('rybalkaScore');
            const savedEnergy = localStorage.getItem('rybalkaEnergy');
            if (savedScore) score = parseInt(savedScore);
            if (savedEnergy) energy = parseInt(savedEnergy);
            updateScores();

            if (localStorage.getItem(CHANNEL_REWARD_KEY) === 'true') {
                document.getElementById('claimBtn').disabled = true;
                document.getElementById('claimBtn').textContent = '✅ Бонус вже отримано';
            }
        }

        function saveProgress() {
            localStorage.setItem('rybalkaScore', score);
            localStorage.setItem('rybalkaEnergy', energy);
        }

        function updateScores() {
            document.getElementById('score').textContent = score;
            document.getElementById('profile-score').textContent = score;
            document.getElementById('energy').textContent = energy;
            document.getElementById('profile-energy').textContent = energy;
            document.getElementById('user-id').textContent = userId;
        }

        const tapArea = document.getElementById('tap-area');

        tapArea.addEventListener('click', (e) => {
            if (energy <= 0) return alert("⚠️ Енергія закінчилася! Зачекай трохи 🎣");
            score += 2;
            energy -= 1;
            updateScores();
            createFloatingText(e.clientX, e.clientY + window.scrollY, '+2');
            saveProgress();
        });

        function createFloatingText(x, y, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.textContent = text;
            msg.style.left = x + 'px';
            msg.style.top = y + 'px';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1800);
        }

        setInterval(() => {
            if (energy < 100) {
                energy = Math.min(100, energy + 1);
                updateScores();
                saveProgress();
            }
        }, 3000);

        function switchTab(tabIndex) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(['screen-tap','screen-profile','screen-rewards'][tabIndex]).classList.add('active');
            document.querySelectorAll('.tab')[tabIndex].classList.add('active');
        }

        function openChannel() {
            const url = "https://t.me/vexoo_hub";
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.openLink(url);
            } else {
                window.open(url, '_blank');
            }
        }

        // Перевірка + видача бонусу (поки що без реальної перевірки підписки)
        function checkAndClaimChannel() {
            if (localStorage.getItem(CHANNEL_REWARD_KEY) === 'true') {
                return alert('✅ Ти вже отримав цей бонус!');
            }

            // Тут буде виклик до backend пізніше
            score += 498;
            updateScores();
            saveProgress();
            localStorage.setItem(CHANNEL_REWARD_KEY, 'true');

            const btn = document.getElementById('claimBtn');
            btn.disabled = true;
            btn.textContent = '✅ Бонус вже отримано';

            alert('🎉 +498 РибКоінів нараховано!\nДякуємо за підписку на канал!');
        }

        function copyReferralLink() {
            const refLink = `https://t.me/${botUsername}?start=ref${userId}`;
            navigator.clipboard.writeText(refLink).then(() => {
                alert(`✅ Посилання скопійовано!\n\n${refLink}`);
            }).catch(() => {
                alert(`Реферальне посилання:\n\n${refLink}\n\nДовго натисни і скопіюй`);
            });
        }

        function activatePromo() {
            const code = document.getElementById('promoInput').value.trim();
            if (!code) return alert("Введіть промокод!");
            alert(`Промокод "${code}" активовано! (тест)`);
        }

        window.onload = () => {
            loadProgress();
        };
    </script>
</body>
</html>
