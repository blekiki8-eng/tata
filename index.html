<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рибалка Клікер</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0a3d62, #1e90ff);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            padding: 20px;
        }
        #fish {
            width: 220px;
            height: 220px;
            margin: 30px auto;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        #fish:active {
            transform: scale(0.85);
        }
        .score {
            font-size: 28px;
            margin: 10px 0;
        }
        .energy {
            font-size: 20px;
            margin: 15px 0;
        }
        button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 10px;
            font-size: 18px;
        }
        .message {
            position: absolute;
            font-size: 18px;
            color: #ffeb3b;
            pointer-events: none;
            animation: floatUp 1.5s forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎣 Рибалка Віті</h1>
        <div class="score">Улов: <span id="score">0</span> РибКоінів</div>
        <div class="energy">Енергія: <span id="energy">100</span>/100</div>
        
        <img id="fish" src="https://i.imgur.com/5z5z5z5.png" alt="Риба"> <!-- Тут буде картинка риби -->
        
        <button onclick="claimDaily()">Щоденний бонус</button>
        <button onclick="showReferrals()">Запросити друга (+500)</button>
    </div>

    <script>
        let score = 0;
        let energy = 100;
        const energyRegenRate = 1; // відновлення енергії кожні 3 секунди

        const scoreEl = document.getElementById('score');
        const energyEl = document.getElementById('energy');
        const fish = document.getElementById('fish');

        // Тап по рибі
        fish.addEventListener('click', (e) => {
            if (energy <= 0) return;

            score += 10;
            energy -= 1;
            
            scoreEl.textContent = score;
            energyEl.textContent = energy;

            // Анімація +1
            createFloatingText(e.clientX, e.clientY, '+10');
        });

        function createFloatingText(x, y, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.textContent = text;
            msg.style.left = x + 'px';
            msg.style.top = y + 'px';
            document.body.appendChild(msg);

            setTimeout(() => msg.remove(), 1500);
        }

        // Відновлення енергії
        setInterval(() => {
            if (energy < 100) {
                energy = Math.min(100, energy + energyRegenRate);
                energyEl.textContent = energy;
            }
        }, 3000);

        // Щоденний бонус (просто для демо)
        function claimDaily() {
            alert('✅ Ти отримав 500 РибКоінів за щоденний вхід!');
            score += 500;
            scoreEl.textContent = score;
        }

        // Реферали (просто демо)
        function showReferrals() {
            alert('🔗 Твоє реферальне посилання:\nhttps://t.me/VityaRybalka_bot?start=ref' + Math.floor(Math.random()*10000));
            score += 500;
            scoreEl.textContent = score;
        }

        // Повідомлення при завантаженні
        window.onload = () => {
            alert('🎣 Добро пожаловать на рибалку!\nТапай по рибі, щоб ловити улов.\nЕнергія відновлюється з часом.');
        };
    </script>
</body>
</html>
