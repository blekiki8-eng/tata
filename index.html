<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Lake</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        
        #lake { 
            width: 250px; height: 250px; 
            background: radial-gradient(circle at 30% 30%, #00f2fe, #004e92);
            border-radius: 50%; margin: 30px auto;
            position: relative; box-shadow: 0 0 50px rgba(0, 210, 255, 0.3);
            display: flex; align-items: center; justify-content: center;
        }

        .stat-card { background: var(--card); border-radius: 20px; padding: 20px; width: 85%; margin: 10px auto; }
        .row { display: flex; justify-content: space-between; margin: 10px 0; }
        .game-btn { 
            background: linear-gradient(135deg, #00d2ff, #3a7bd5); 
            color: white; border: none; padding: 20px; border-radius: 50px; 
            width: 80%; font-size: 18px; font-weight: bold;
        }
        .tab-content { display: none; flex-direction: column; align-items: center; padding-top: 20px; }
        .active { display: flex; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #0f172a; padding-bottom: 20px; border-top: 1px solid #1e293b; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #64748b; font-size: 12px; }
        .active-nav { color: var(--primary); }
    </style>
</head>
<body>

    <div id="profile" class="tab-content">
        <h2>МІЙ ПРОФІЛЬ</h2>
        <div class="stat-card">
            <div class="row"><span>👤 Гравець:</span><span id="u-name">...</span></div>
            <div class="row"><span>🆔 Мій ID:</span><span id="u-id">Завантаження...</span></div>
            <div class="row"><span>💰 Баланс:</span><span id="balance" style="color: #fbbf24;">0</span></div>
        </div>
    </div>

    <div id="fishing" class="tab-content active">
        <h2>ОЗЕРО</h2>
        <div id="lake"><div id="bobber" style="font-size: 50px; display:none;">🏮</div><div id="water">🌊</div></div>
        <p id="status">Готовий до риболовлі?</p>
        <button id="action-btn" class="game-btn" onclick="handleAction()">ЗАКИНУТИ</button>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="tab('profile', this)">ПРОФІЛЬ</div>
        <div class="nav-item active-nav" onclick="tab('fishing', this)">ОЗЕРО</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const UID = tg.initDataUnsafe?.user?.id || "Unknown";
        let coins = 0, isFishing = false, canPull = false;

        async function load() {
            // Отримуємо актуальні дані з бази при кожному вході
            const r = await fetch(`/api/get_balance?user_id=${UID}`);
            const d = await r.json();
            if (d) {
                coins = d.coins;
                document.getElementById('u-name').innerText = d.name || "Рибалка";
                document.getElementById('u-id').innerText = UID;
                document.getElementById('balance').innerText = coins;
            }
        }

        async function save() {
            // Зберігаємо дані в базу, щоб вони не зникли
            await fetch('/api/save_balance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: UID, coins: coins })
            });
        }

        function handleAction() {
            const btn = document.getElementById('action-btn');
            if (!isFishing) {
                isFishing = true; btn.innerText = "ЧЕКАЙ...";
                setTimeout(() => {
                    canPull = true; btn.innerText = "ТЯГНИ!";
                    tg.HapticFeedback.impactOccurred('heavy');
                }, 2000);
            } else if (canPull) {
                isFishing = false; canPull = false;
                const win = Math.floor(Math.random() * 15) + 5;
                coins += win;
                document.getElementById('balance').innerText = coins;
                btn.innerText = "ЗАКИНУТИ";
                save(); // Зберігаємо після кожного улову
            }
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active-nav');
        }

        tg.expand();
        load();
    </script>
</body>
</html>
