<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Lake Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; }
        
        /* ВИПРАВЛЕННЯ: Дозволяємо прокручування по вертикалі, якщо контент не вміщається */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            overflow-x: hidden; /* Забороняємо горизонтальне прокручування */
            overflow-y: auto;   /* Дозволяємо вертикальне прокручування */
            padding-bottom: 80px; /* Відступ знизу, щоб контент не ховався за навбаром */
        }
        
        /* ВИПРАВЛЕННЯ: Трохи зменшили озеро, щоб звільнити місце */
        #lake { 
            width: 200px; height: 200px; 
            background: radial-gradient(circle at 30% 30%, #00f2fe, #004e92);
            border-radius: 50%; margin: 20px auto;
            position: relative; box-shadow: 0 0 40px rgba(0, 210, 255, 0.3);
            display: flex; align-items: center; justify-content: center;
            overflow: visible;
        }

        /* Твій поплавок */
        #my-poplavok {
            width: 50px; height: 50px; /* Зменшили, щоб пропорційно озеру */
            position: absolute; display: none; z-index: 100;
        }

        /* Анімація кружіння (радіус зменшено відповідно до озера) */
        .orbit { animation: rotateOrbit 4s linear infinite; }
        @keyframes rotateOrbit {
            from { transform: rotate(0deg) translateX(100px) rotate(0deg); }
            to { transform: rotate(360deg) translateX(100px) rotate(-360deg); }
        }

        /* Анімація клювання */
        .bite { animation: shakeBite 0.2s infinite; }
        @keyframes shakeBite {
            0%, 100% { transform: rotate(0deg) translateX(100px) translateY(0px); }
            50% { transform: rotate(0deg) translateX(100px) translateY(12px); }
        }

        .stat-card { background: var(--card); border-radius: 20px; padding: 15px; width: 85%; margin: 10px auto; border: 1px solid rgba(255,255,255,0.1); }
        .row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px;}
        
        /* Кнопка */
        .game-btn { 
            background: linear-gradient(135deg, #00d2ff, #3a7bd5); 
            color: white; border: none; 
            padding: 15px; /* Зменшили паддінг */
            border-radius: 50px; 
            width: 85%; font-size: 18px; font-weight: bold; cursor: pointer;
            margin-bottom: 20px; /* Відступ знизу кнопки */
        }
        
        .tab-content { display: none; flex-direction: column; align-items: center; padding-top: 15px; }
        .active { display: flex; }
        
        /* Навігація - залишаємо фіксованою знизу */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #0f172a; padding-bottom: 20px; border-top: 1px solid #1e293b; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #64748b; font-size: 12px; }
        .active-nav { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div id="profile" class="tab-content">
        <h2 style="color: var(--primary);">МІЙ ПРОФІЛЬ</h2>
        <div class="stat-card">
            <div class="row"><span>👤 Гравець:</span><span id="u-name">...</span></div>
            <div class="row"><span>🆔 Мій ID:</span><span id="u-id">000000</span></div>
            <div class="row"><span>💰 Баланс:</span><span id="balance" style="color: #fbbf24; font-weight: bold;">0</span></div>
        </div>
    </div>

    <div id="fishing" class="tab-content active">
        <h2 style="letter-spacing: 5px; margin-bottom: 10px;">ОЗЕРО</h2>
        <div id="lake">
            <img src="poplavok.png" id="my-poplavok">
            <div id="water-icon" style="font-size: 60px;">🌊</div>
        </div>
        <p id="status" style="font-size: 16px; color: #38bdf8; margin: 10px 0;">Готовий до риболовлі?</p>
        <button id="action-btn" class="game-btn" onclick="handleAction()">ЗАКИНУТИ</button>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="tab('profile', this)">ПРОФІЛЬ</div>
        <div class="nav-item active-nav" onclick="tab('fishing', this)">ОЗЕРО</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const UID = String(tg.initDataUnsafe?.user?.id || "000000");
        let coins = 0, isFishing = false, canPull = false;

        async function load() {
            const r = await fetch(`/api/get_balance?user_id=${UID}`);
            const d = await r.json();
            if (!d.error) {
                coins = d.coins;
                document.getElementById('u-name').innerText = d.name;
                document.getElementById('u-id').innerText = UID;
                document.getElementById('balance').innerText = coins;
            }
        }

        async function save() {
            await fetch('/api/save_balance', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: UID, coins: coins })
            });
        }

        function handleAction() {
            const btn = document.getElementById('action-btn');
            const st = document.getElementById('status');
            const pop = document.getElementById('my-poplavok');
            const wat = document.getElementById('water-icon');

            if (!isFishing) {
                isFishing = true; canPull = false;
                btn.innerText = "ЧЕКАЙ..."; btn.disabled = true;
                st.innerText = "Поплавок кружляє...";
                wat.style.display = "none";
                pop.style.display = "block";
                pop.className = "orbit";

                setTimeout(() => {
                    canPull = true; btn.disabled = false;
                    btn.innerText = "ТЯГНИ!"; st.innerText = "КЛЮЄ!!!";
                    pop.className = "bite";
                    tg.HapticFeedback.notificationOccurred('warning');
                }, Math.random() * 3000 + 2000);
            } else if (canPull) {
                isFishing = false; canPull = false;
                pop.style.display = "none";
                wat.style.display = "block";
                const win = Math.floor(Math.random() * 20) + 5;
                coins += win;
                document.getElementById('balance').innerText = coins;
                st.innerText = `Зловив! +${win} монет`;
                btn.innerText = "ЗАКИНУТИ";
                save();
            }
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active-nav');
        }

        tg.expand();
        load();
    </script>
</body>
</html>
