<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fishing Game PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; --accent: #4ade80; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow-y: auto; padding-bottom: 100px; }
        
        .tab-content { display: none; flex-direction: column; align-items: center; padding: 20px; width: 100%; box-sizing: border-box; }
        .active { display: flex; }

        /* Озеро та Поплавок */
        #lake { 
            width: 220px; height: 220px; 
            background: radial-gradient(circle at 30% 30%, #00f2fe, #004e92);
            border-radius: 50%; margin: 20px auto; position: relative;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.4); display: flex; align-items: center; justify-content: center;
        }
        #my-poplavok {
            width: 70px; height: 70px; /* Збільшений поплавок */
            position: absolute; display: none; z-index: 100; transition: all 0.3s ease;
        }

        /* Анімація */
        .bite { animation: shake 0.2s infinite; }
        @keyframes shake { 0% { transform: translateY(0); } 50% { transform: translateY(15px); } 100% { transform: translateY(0); } }

        /* Картки та кнопки */
        .stat-card { background: var(--card); border-radius: 20px; padding: 15px; width: 100%; margin-bottom: 15px; }
        .row { display: flex; justify-content: space-between; margin: 10px 0; }
        .game-btn { background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; border: none; padding: 18px; border-radius: 50px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        /* Маркет */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .market-item { background: var(--card); height: 100px; border-radius: 15px; border: 2px dashed #334155; display: flex; align-items: center; justify-content: center; color: #475569; }

        /* Навігація */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e293b; padding-bottom: 25px; border-top: 1px solid #334155; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; padding: 15px 5px; color: #94a3b8; font-size: 11px; }
        .active-nav { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <!-- ПРОФІЛЬ -->
    <div id="profile" class="tab-content">
        <h2>ПРОФІЛЬ</h2>
        <div class="stat-card">
            <div class="row"><span>👤 Гравець:</span><span id="u-name">...</span></div>
            <div class="row"><span>💰 Баланс:</span><span id="balance-p">0</span></div>
        </div>
        <div class="stat-card">
            <p style="font-size: 14px; color: #94a3b8;">Запроси друга та отримай 50 монет!</p>
            <button class="game-btn" style="padding: 10px; font-size: 14px;" onclick="copyRef()">📋 Копіювати посилання</button>
        </div>
    </div>

    <!-- ОЗЕРО -->
    <div id="fishing" class="tab-content active">
        <h2>ОЗЕРО</h2>
        <div id="lake">
            <img src="poplavok.png" id="my-poplavok">
            <div id="water-icon" style="font-size: 60px;">🌊</div>
        </div>
        <div id="status" style="height: 50px; text-align: center;">Готовий?</div>
        <button id="action-btn" class="game-btn" onclick="handleAction()">ЗАКИНУТИ</button>
    </div>

    <!-- МАРКЕТ -->
    <div id="market" class="tab-content">
        <h2>МАРКЕТ</h2>
        <div class="market-grid">
            <div class="market-item">Пусто</div>
            <div class="market-item">Пусто</div>
            <div class="market-item">Пусто</div>
            <div class="market-item">Пусто</div>
        </div>
        <button class="game-btn" style="margin-top: 20px; background: #8b5cf6;" onclick="tab('rewards', document.getElementById('nav-rewards'))">🎁 REWARDS</button>
    </div>

    <!-- REWARDS -->
    <div id="rewards" class="tab-content">
        <h2>REWARDS</h2>
        <div class="stat-card" style="text-align: center; color: #94a3b8;">
            Завдання скоро з'являться...
        </div>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="tab('profile', this)">ПРОФІЛЬ</div>
        <div class="nav-item active-nav" onclick="tab('fishing', this)">ОЗЕРО</div>
        <div class="nav-item" id="nav-market" onclick="tab('market', this)">МАРКЕТ</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const UID = String(tg.initDataUnsafe?.user?.id || "000000");
        const UName = tg.initDataUnsafe?.user?.first_name || "Рибалка";
        let coins = 0, isFishing = false, canPull = false;

        // ШАНСИ: 40% сміття, 60% риба (шанс на рибу став вищим)
        function getRandomLoot() {
            const chance = Math.random() * 100;
            if (chance < 40) {
                return Math.random() < 0.5 ? { name: "🍼 Бутилка", price: -10 } : { name: "🛍️ Пакет", price: -5 };
            } else {
                const fishChance = Math.random() * 100;
                if (fishChance <= 2) return { name: "🔥 ДОБРИЙ КАРАСЬ", price: 67, special: true }; // Шанс карася х2 (2%)
                else if (fishChance <= 35) return { name: "🐠 Маленький карасик", price: 15 };
                else return { name: "🐟 Маленька риба", price: 5 };
            }
        }

        async function load() {
            const r = await fetch(`/api/get_balance?user_id=${UID}`);
            const d = await r.json();
            if (!d.error) {
                coins = d.coins;
                document.getElementById('u-name').innerText = d.name;
                document.getElementById('balance-p').innerText = coins;
            }
        }

        async function save() {
            await fetch('/api/save_balance', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: UID, coins: coins })
            });
        }

        function copyRef() {
            const refLink = `https://t.me/ТВІЙ_ЮЗЕРНЕЙМ_БОТА?start=${UID}`;
            navigator.clipboard.writeText(refLink);
            alert("Посилання скопійовано! Відправ його другу.");
        }

        function handleAction() {
            const btn = document.getElementById('action-btn');
            const st = document.getElementById('status');
            const pop = document.getElementById('my-poplavok');
            const wat = document.getElementById('water-icon');

            if (!isFishing) {
                isFishing = true; canPull = false;
                btn.innerText = "ЧЕКАЙ..."; btn.disabled = true;
                st.innerText = "Вудка закинута...";
                
                // Рандомне місце поплавка на озері
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 70;
                const x = Math.cos(angle) * dist;
                const y = Math.sin(angle) * dist;
                
                pop.style.left = `calc(50% - 35px + ${x}px)`;
                pop.style.top = `calc(50% - 35px + ${y}px)`;
                pop.style.display = "block";
                wat.style.display = "none";

                setTimeout(() => {
                    canPull = true; btn.disabled = false;
                    btn.innerText = "ТЯГНИ!"; pop.className = "bite";
                    tg.HapticFeedback.notificationOccurred('warning');
                }, Math.random() * 3000 + 2000);

            } else if (canPull) {
                isFishing = false; canPull = false;
                pop.style.display = "none"; pop.className = ""; wat.style.display = "block";
                
                const loot = getRandomLoot();
                coins += loot.price; if (coins < 0) coins = 0;
                document.getElementById('balance-p').innerText = coins;
                st.innerHTML = `${loot.name} (${loot.price > 0 ? '+' : ''}${loot.price})`;
                btn.innerText = "ЗАКИНУТИ";
                save();
            }
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active-nav');
        }

        tg.expand();
        load();
    </script>
</body>
</html>
