<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рибалка Віті</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(to bottom, #0a3d62, #1e90ff);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            height: 100vh;
            overflow: hidden;
        }
        .score { font-size: 34px; margin: 15px 0 8px 0; font-weight: bold; }
        .energy { font-size: 24px; margin-bottom: 25px; }

        #tap-area {
            width: 265px; height: 265px; margin: 30px auto;
            background: radial-gradient(circle, #ffeb3b, #ff9800);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 140px; cursor: pointer;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        #tap-area:active { transform: scale(0.85); }

        .donate-btn {
            background: linear-gradient(#ff5722, #f44336);
            color: white;
            border: none;
            padding: 16px 32px;
            margin: 20px auto;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            width: 85%;
        }

        .tabs {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; background: rgba(0,0,0,0.85);
            padding: 10px 5px;
        }
        .tab {
            flex: 1; padding: 14px 6px; font-size: 15px; font-weight: bold; cursor: pointer;
        }
        .tab.active { background: #ff9800; color: black; border-radius: 12px; margin: 0 4px; }

        .screen { display: none; padding: 20px; padding-bottom: 100px; height: calc(100vh - 80px); overflow-y: auto; }
        .screen.active { display: block; }
    </style>
</head>
<body>

    <div id="screen-tap" class="screen active">
        <div class="score">Улов: <span id="score">0</span> РибКоінів</div>
        <div class="energy">Енергія: <span id="energy">100</span>/100</div>
        <div id="tap-area">🐠</div>
        <button class="donate-btn" onclick="alert('💰 Donate відкрито в чаті бота')">💰 Donate</button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="alert('Тапати')">Тапати</div>
        <div class="tab" onclick="alert('Profile')">Profile</div>
        <div class="tab" onclick="alert('Rewards')">Rewards</div>
        <div class="tab" onclick="alert('Fishing')">Fishing</div>
    </div>

    <script>
        let score = 0;
        let energy = 100;

        document.getElementById('tap-area').addEventListener('click', () => {
            if (energy > 0) {
                score += 2;
                energy -= 1;
                document.getElementById('score').textContent = score;
                document.getElementById('energy').textContent = energy;
            }
        });

        window.onload = () => {
            console.log("Mini App завантажено успішно");
        };
    </script>
</body>
</html>
