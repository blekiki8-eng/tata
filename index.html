<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fishing Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #ffcc00;
            --secondary-color: #0088cc;
            --premium-color: #e74c3c;
            --bg-color: #1a2a3a;
            --card-bg: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .tab-content {
            flex: 1;
            display: none;
            padding: 20px;
            text-align: center;
        }

        .active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Грові кнопки */
        .game-btn {
            background: linear-gradient(180deg, #f39c12 0%, #d35400 100%);
            color: white;
            border: 2px solid #fff;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            margin: 10px;
            width: 80%;
        }

        .game-btn:active { transform: scale(0.95); }

        /* Озеро */
        #lake {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #3498db 0%, #2980b9 100%);
            border-radius: 50%;
            border: 8px solid #ecf0f1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            margin: 20px 0;
            position: relative;
        }

        /* Статистика */
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid var(--primary-color);
            width: 85%;
            margin-top: 10px;
            text-align: left;
        }

        .id-badge {
            font-size: 12px;
            background: #444;
            padding: 2px 8px;
            border-radius: 5px;
            color: #bbb;
            display: inline-block;
            margin-bottom: 10px;
        }

        .balance-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        /* Нижня панель */
        .nav-bar {
            display: flex;
            background-color: #121c26;
            border-top: 2px solid #2c3e50;
            padding: 10px 0 25px 0;
        }

        .nav-item { flex: 1; text-align: center; color: #7f8c8d; font-size: 12px; }
        .nav-item.active-nav { color: var(--primary-color); }
        .icon { font-size: 24px; display: block; margin-bottom: 5px; }

        .status-msg { height: 30px; margin-top: 10px; font-weight: bold; color: var(--primary-color); }
    </style>
</head>
<body>

    <div id="profile" class="tab-content active">
        <h2 style="color: var(--primary-color);">ПРОФІЛЬ</h2>
        <div class="stat-card">
            <span class="id-badge">ID: <span id="user-id">00000000</span></span>
            <h3 id="user-name" style="margin: 0 0 15px 0;">Гість</h3>
            
            <div class="balance-item">
                <span>💰 Fish Coins:</span>
                <span id="balance" style="color: var(--primary-color); font-weight: bold;">100</span>
            </div>

            <div class="balance-item">
                <span>💎 Donat Fish Coins:</span>
                <span id="dfc-balance" style="color: var(--premium-color); font-weight: bold;">0</span>
            </div>
            <p style="font-size: 10px; color: #7f8c8d; text-align: center; margin-top: 10px;">DFC скоро у продажу</p>
        </div>
    </div>

    <div id="fishing" class="tab-content">
        <h2 style="color: #3498db;">ОЗЕРО ТАТА</h2>
        <div id="lake">🌊</div>
        <div class="status-msg" id="game-status">Закидай вудку!</div>
        <button class="game-btn" onclick="startFishing()">ЛОВИТИ!</button>
    </div>

    <div id="market" class="tab-content">
        <h2 style="color: #2ecc71;">РИНОК</h2>
        <div class="stat-card">
            <p>Розділ у розробці...</p>
            <button class="game-btn" style="background: grey; opacity: 0.5;">СКОРО</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-nav" onclick="showTab('profile', this)">
            <span class="icon">👤</span> Профіль
        </div>
        <div class="nav-item" onclick="showTab('fishing', this)">
            <span class="icon">🎣</span> Рибалка
        </div>
        <div class="nav-item" onclick="showTab('market', this)">
            <span class="icon">🛒</span> Ринок
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let coins = 100;
        let dfc = 0;

        function showTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active-nav'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active-nav');
        }

        function updateUI() {
            document.getElementById('balance').innerText = coins;
            document.getElementById('dfc-balance').innerText = dfc;
        }

        function startFishing() {
            const status = document.getElementById('game-status');
            status.innerText = "Чекаємо на клювання...";
            
            setTimeout(() => {
                const chance = Math.random() * 100;
                let result = "";
                let change = 0;

                if (chance <= 25) {
                    result = "🍾 Бутилка!";
                    change = -10;
                } else if (chance <= 50) {
                    result = "🛍️ Пакет!";
                    change = -10;
                } else if (chance <= 75) {
                    result = "🐟 Маленька рибка!";
                    change = 10;
                } else {
                    result = "🐠 Маленький карасик!";
                    change = 10;
                }

                coins += change;
                if (coins < 0) coins = 0;
                
                status.innerText = `${result} [${change > 0 ? '+' : ''}${change} FC]`;
                updateUI();
                tg.HapticFeedback.notificationOccurred(change > 0 ? 'success' : 'error');
            }, 1200);
        }

        // Отримання даних з Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('user-id').innerText = tg.initDataUnsafe.user.id;
        }

        updateUI();
    </script>
</body>
</html>
