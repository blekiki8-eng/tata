<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Cash Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-color: #ffcc00;
            --lake-color: #2980b9;
            --bg-color: #1a2a3a;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* Озеро з анімацією хвиль */
        #lake {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, #3498db 30%, #2980b9 100%);
            border-radius: 50%;
            border: 10px solid #ffffff22;
            margin: 30px auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        /* Поплавок */
        #bobber {
            font-size: 50px;
            transition: transform 0.3s;
            display: none;
            z-index: 10;
        }

        /* Анімація клювання */
        @keyframes bite {
            0% { transform: translateY(0); }
            50% { transform: translateY(20px); }
            100% { transform: translateY(0); }
        }

        .biting {
            animation: bite 0.2s infinite;
        }

        .game-btn {
            background: linear-gradient(180deg, #f39c12 0%, #d35400 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 5px 0 #a04000;
            cursor: pointer;
            width: 80%;
            margin-bottom: 20px;
        }

        .game-btn:disabled {
            background: #555;
            box-shadow: 0 5px 0 #333;
        }

        /* Хвилі на воді */
        .wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid #ffffff22;
            border-radius: 50%;
            animation: ripple 3s infinite;
            opacity: 0;
        }

        @keyframes ripple {
            0% { transform: scale(0.1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .status-msg {
            font-size: 18px;
            height: 40px;
            color: var(--primary-color);
            margin: 10px 0;
            font-weight: bold;
        }

        /* Вкладки */
        .tab-content { flex: 1; display: none; padding: 20px; }
        .active { display: block; }

        .nav-bar { display: flex; background: #121c26; padding: 15px 0 30px; border-top: 2px solid #2c3e50; }
        .nav-item { flex: 1; color: #7f8c8d; font-size: 12px; cursor: pointer; }
        .active-nav { color: var(--primary-color); }
        .icon { font-size: 24px; display: block; }
    </style>
</head>
<body>

    <div id="profile" class="tab-content">
        <h2 style="color: var(--primary-color);">ПРОФІЛЬ</h2>
        <p>ID: <span id="user-id">---</span></p>
        <div style="background: #2c3e50; padding: 20px; border-radius: 20px;">
            <p>💰 Fish Coins: <b id="balance">100</b></p>
            <p>💎 DFC: <b id="dfc-balance">0</b></p>
        </div>
    </div>

    <div id="fishing" class="tab-content active">
        <h2 style="color: #3498db;">РИБОЛОВЛЯ</h2>
        
        <div id="lake">
            <div class="wave" style="animation-delay: 0s"></div>
            <div class="wave" style="animation-delay: 1s"></div>
            <div id="bobber">📍</div>
            <div id="water-text" style="font-size: 60px;">🌊</div>
        </div>

        <div class="status-msg" id="game-status">Готовий закинути?</div>
        
        <button id="action-btn" class="game-btn" onclick="handleAction()">ЗАКИНУТИ ВУДКУ</button>
    </div>

    <div id="market" class="tab-content">
        <h2>РИНОК</h2>
        <p>Магазин снастей скоро...</p>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="showTab('profile', this)"><span class="icon">👤</span>Профіль</div>
        <div class="nav-item active-nav" onclick="showTab('fishing', this)"><span class="icon">🎣</span>Рибалка</div>
        <div class="nav-item" onclick="showTab('market', this)"><span class="icon">🛒</span>Ринок</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let coins = 100;
        let isFishing = false;
        let canPull = false;
        let timer = null;

        function showTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active-nav');
        }

        function handleAction() {
            const btn = document.getElementById('action-btn');
            const status = document.getElementById('game-status');
            const bobber = document.getElementById('bobber');
            const waterText = document.getElementById('water-text');

            if (!isFishing) {
                // ЗАКИДАННЯ
                isFishing = true;
                btn.innerText = "ЧЕКАЙ...";
                btn.disabled = true;
                status.innerText = "Вудка закинута... Чекаємо...";
                waterText.style.display = "none";
                bobber.style.display = "block";
                bobber.classList.remove('biting');

                // Випадковий час очікування від 2 до 5 секунд
                const waitTime = Math.floor(Math.random() * 3000) + 2000;
                
                timer = setTimeout(() => {
                    canPull = true;
                    btn.disabled = false;
                    btn.innerText = "ТЯГНИ!!!";
                    status.innerText = "КЛЮЄ! ШВИДШЕ!";
                    bobber.classList.add('biting');
                    tg.HapticFeedback.impactOccurred('heavy');
                    
                    // Якщо не натиснув за 1.5 секунди - риба втече
                    timer = setTimeout(() => {
                        if (canPull) resetGame("Риба зірвалася... Занадто повільно!");
                    }, 1500);
                }, waitTime);

            } else if (canPull) {
                // ВИЛОВ
                calculateResult();
            }
        }

        function calculateResult() {
            const status = document.getElementById('game-status');
            const chance = Math.random() * 100;
            let res, change;

            if (chance <= 25) { res = "🍾 Бутилка!"; change = -10; }
            else if (chance <= 50) { res = "🛍️ Пакет!"; change = -10; }
            else if (chance <= 75) { res = "🐟 Маленька рибка!"; change = 10; }
            else { res = "🐠 Карасик!"; change = 10; }

            coins += change;
            if(coins < 0) coins = 0;
            
            tg.HapticFeedback.notificationOccurred(change > 0 ? 'success' : 'warning');
            resetGame(`${res} (${change > 0 ? '+' : ''}${change} FC)`);
        }

        function resetGame(msg) {
            clearTimeout(timer);
            isFishing = false;
            canPull = false;
            const btn = document.getElementById('action-btn');
            btn.innerText = "ЗАКИНУТИ ВУДКУ";
            btn.disabled = false;
            document.getElementById('game-status').innerText = msg;
            document.getElementById('bobber').style.display = "none";
            document.getElementById('water-text').style.display = "block";
            document.getElementById('balance').innerText = coins;
        }

        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-name')?.innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('user-id').innerText = tg.initDataUnsafe.user.id;
        }
    </script>
</body>
</html>
