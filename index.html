<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huipizfksn Fishing</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; --shelf: #3e2723; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        .tab-content { display: none; flex-direction: column; align-items: center; padding: 15px; height: 100vh; }
        .active { display: flex; }
        
        /* LAKE & ANIMATION */
        #lake { 
            width: 300px; height: 300px; background: radial-gradient(circle, #00f2fe, #004e92); 
            border-radius: 50%; position: relative; margin: 20px; overflow: hidden;
            border: 5px solid #1e293b; box-shadow: 0 0 30px rgba(0, 210, 255, 0.3);
        }
        #poplavok { 
            width: 40px; height: 40px; position: absolute; display: none; 
            transition: all 1s ease-in-out; 
        }
        .bite { animation: shake 0.3s infinite !important; }
        @keyframes shake { 0% { transform: translateY(0); } 50% { transform: translateY(10px); } 100% { transform: translateY(0); } }

        /* SHELVES */
        .shelf { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            background: var(--shelf); padding: 15px; border-radius: 10px; width: 100%; 
            border-bottom: 6px solid #2d1b18; box-sizing: border-box;
        }
        .slot { 
            background: var(--card); height: 100px; border-radius: 8px; border: 1px solid #5d4037;
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px;
        }

        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e293b; padding-bottom: 20px; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #94a3b8; font-size: 11px; }
        .active-nav { color: var(--primary); font-weight: bold; }
        
        .main-btn { 
            background: linear-gradient(135deg, #00d2ff, #3a7bd5); color: white; border: none; 
            padding: 15px 40px; border-radius: 30px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- LAKE TAB -->
    <div id="fishing-tab" class="tab-content active">
        <h2 id="title-text">LAKE</h2>
        <div id="lake">
            <img src="poplavok.png" id="poplavok">
        </div>
        <div id="status" style="margin-bottom: 20px; min-height: 24px;">Ready?</div>
        <button id="action-btn" class="main-btn" onclick="startFishing()">CAST ROD</button>
    </div>

    <!-- INVENTORY TAB -->
    <div id="inventory-tab" class="tab-content">
        <h2 data-lang="nav_inv">INVENTORY</h2>
        <div id="inv-grid" class="shelf"></div>
    </div>

    <!-- PROFILE/SETTINGS -->
    <div id="profile-tab" class="tab-content">
        <h2 data-lang="nav_prof">PROFILE</h2>
        <div style="background:var(--card); padding:20px; border-radius:15px; width:90%;">
            <p>💰 <span data-lang="balance">Balance</span>: <b id="balance">0</b></p>
            <p>🆔 ID: <b id="u-id">0</b></p>
            <hr color="#334155">
            <label>🌐 Language:</label>
            <select id="lang-select" onchange="changeLang(this.value)" style="width:100%; padding:10px; margin-top:5px; border-radius:10px; background:#0f172a; color:white;">
                <option value="en">English</option>
                <option value="uk">Українська</option>
            </select>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="tab('fishing-tab', this)">LAKE</div>
        <div class="nav-item" onclick="tab('inventory-tab', this); renderInv();">SHELF</div>
        <div class="nav-item" onclick="tab('profile-tab', this)">USER</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const UID = String(tg.initDataUnsafe?.user?.id || "000000");
        let coins = 0, inv = [], lang = 'en', isFishing = false, biteTimer = null;

        const i18n = {
            en: { cast: "CAST ROD", pull: "CATCH!", status_wait: "Waiting for fish...", status_bite: "BITE! PULL!", fish_1: "Carp", fish_2: "Perch", fish_3: "Goldfish", balance: "Balance", nav_inv: "SHELVES", nav_prof: "USER" },
            uk: { cast: "ЗАКИНУТИ", pull: "ТЯГНИ!", status_wait: "Чекаємо рибу...", status_bite: "КЛЮЄ! ТЯГНИ!", fish_1: "Карась", fish_2: "Окунь", fish_3: "Золота рибка", balance: "Баланс", nav_inv: "ПОЛИЧКИ", nav_prof: "ПРОФІЛЬ" }
        };

        async function load() {
            const r = await fetch(`/api/get_user?user_id=${UID}`);
            const d = await r.json();
            if(!d.error) {
                coins = d.coins; inv = d.inventory || []; lang = d.lang || 'en';
                document.getElementById('balance').innerText = coins;
                document.getElementById('u-id').innerText = UID;
                document.getElementById('lang-select').value = lang;
                updateText();
            }
        }

        function updateText() {
            const t = i18n[lang];
            document.getElementById('action-btn').innerText = isFishing ? t.pull : t.cast;
            document.querySelectorAll('[data-lang]').forEach(el => {
                el.innerText = t[el.getAttribute('data-lang')];
            });
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        function movePoplavok() {
            const p = document.getElementById('poplavok');
            p.style.left = Math.random() * 240 + "px";
            p.style.top = Math.random() * 240 + "px";
        }

        function startFishing() {
            const btn = document.getElementById('action-btn');
            const p = document.getElementById('poplavok');
            const st = document.getElementById('status');

            if (!isFishing) {
                isFishing = true;
                btn.innerText = i18n[lang].pull;
                btn.disabled = true; // Тимчасово вимикаємо, поки поплавок "пливе"
                st.innerText = i18n[lang].status_wait;
                p.style.display = "block";
                p.classList.remove("bite");

                // Поплавок рухається в кілька випадкових точок
                let moves = 0;
                const moveInterval = setInterval(() => {
                    movePoplavok();
                    moves++;
                    if (moves >= 3) {
                        clearInterval(moveInterval);
                        p.classList.add("bite");
                        st.innerText = i18n[lang].status_bite;
                        btn.disabled = false;
                        tg.HapticFeedback.notificationOccurred('success');
                    }
                }, 1000);
            } else {
                // Ловимо!
                isFishing = false;
                p.style.display = "none";
                const fishId = "fish_" + (Math.floor(Math.random() * 3) + 1);
                inv.push({id: fishId});
                st.innerText = "Caught: " + i18n[lang][fishId];
                updateText();
                
                fetch('/api/save_user', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: UID, inventory: inv})
                });
                renderInv();
            }
        }

        function renderInv() {
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = "";
            inv.forEach(item => {
                grid.innerHTML += `<div class="slot"><b>${i18n[lang][item.id]}</b><br><small>Ready</small></div>`;
            });
        }

        async function changeLang(v) {
            lang = v;
            updateText();
            await fetch('/api/save_user', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: UID, lang: v})
            });
        }

        tg.expand();
        load();
    </script>
</body>
</html>
