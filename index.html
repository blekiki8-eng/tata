<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рибалка Віті</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0a3d62, #1e90ff);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            padding: 20px;
        }
        #fish {
            width: 240px;
            height: 240px;
            margin: 30px auto;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        #fish:active {
            transform: scale(0.82);
        }
        .score {
            font-size: 28px;
            margin: 10px 0;
            font-weight: bold;
        }
        .energy {
            font-size: 22px;
            margin: 15px 0;
        }
        button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 14px 28px;
            margin: 10px 5px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
        }
        .message {
            position: absolute;
            font-size: 22px;
            color: #ffeb3b;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1.8s forwards;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-120px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎣 Рибалка Віті</h1>
        
        <div class="score">Улов: <span id="score">0</span> РибКоінів</div>
        <div class="energy">Енергія: <span id="energy">100</span>/100</div>
        
        <!-- Нова нормальна картинка риби -->
        <img id="fish" src="https://i.imgur.com/8vN5v3L.png" alt="Риба">
        
        <button onclick="claimDaily()">Щоденний бонус (+500)</button>
        <button onclick="showReferrals()">Запросити друга (+500)</button>
    </div>

    <script>
        let score = 0;
        let energy = 100;

        const scoreEl = document.getElementById('score');
        const energyEl = document.getElementById('energy');
        const fish = document.getElementById('fish');

        fish.addEventListener('click', (e) => {
            if (energy <= 0) {
                alert("Енергія закінчилася! Зачекай трохи 🎣");
                return;
            }

            score += 10;
            energy -= 1;
            
            scoreEl.textContent = score;
            energyEl.textContent = energy;

            createFloatingText(e.clientX, e.clientY + window.scrollY, '+10');
        });

        function createFloatingText(x, y, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.textContent = text;
            msg.style.left = x + 'px';
            msg.style.top = y + 'px';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1800);
        }

        // Відновлення енергії кожні 3 секунди
        setInterval(() => {
            if (energy < 100) {
                energy = Math.min(100, energy + 1);
                energyEl.textContent = energy;
            }
        }, 3000);

        function claimDaily() {
            score += 500;
            scoreEl.textContent = score;
            alert('✅ Ти отримав щоденний бонус +500 РибКоінів!');
        }

        function showReferrals() {
            const refCode = Math.floor(10000 + Math.random() * 90000);
            alert(`🔗 Твоє реферальне посилання:\nhttps://t.me/твій_бот?start=ref${refCode}\n\nЗапроси друга — отримай +500 РибКоінів!`);
            score += 500;
            scoreEl.textContent = score;
        }

        // Привітання при першому запуску
        window.onload = () => {
            if (score === 0) {
                alert('🎣 Ласкаво просимо на рибалку!\n\nТапай по рибі, щоб ловити улов.\nЕнергія відновлюється автоматично.');
            }
        };
    </script>
</body>
</html>
