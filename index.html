<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рибалка Віті</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0a3d62, #1e90ff);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
        }
        .score {
            font-size: 32px;
            margin: 10px 0;
            font-weight: bold;
        }
        .energy {
            font-size: 24px;
            margin: 5px 0 20px 0;
        }
        #tap-area {
            width: 260px;
            height: 260px;
            margin: 20px auto;
            background: radial-gradient(circle, #ffeb3b, #ff9800);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 130px;
            cursor: pointer;
            transition: transform 0.08s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            user-select: none;
        }
        #tap-area:active {
            transform: scale(0.85);
        }
        .tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 0;
        }
        .tab {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .tab.active {
            background: #ff9800;
            color: white;
            border-radius: 10px;
            margin: 0 5px;
        }
        button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 14px 28px;
            margin: 15px 5px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
        }
        .message {
            position: absolute;
            font-size: 26px;
            color: #ffeb3b;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1.8s forwards;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-140px); }
        }
        .content {
            padding-bottom: 80px;
        }
    </style>
</head>
<body>
    <div class="header">🎣 Рибалка Віті</div>
    
    <div class="content">
        <div class="score">Улов: <span id="score">0</span> РибКоінів</div>
        <div class="energy">Енергія: <span id="energy">100</span>/100</div>
        
        <!-- Кругла тапалка -->
        <div id="tap-area">🐠</div>
    </div>

    <!-- Вкладки внизу -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">Тапати</div>
        <div class="tab" onclick="switchTab(1)">Profile</div>
        <div class="tab" onclick="switchTab(2)">Rewards</div>
    </div>

    <script>
        let score = 0;
        let energy = 100;

        const scoreEl = document.getElementById('score');
        const energyEl = document.getElementById('energy');
        const tapArea = document.getElementById('tap-area');

        // 1 тап = 2 РибКоіни
        tapArea.addEventListener('click', (e) => {
            if (energy <= 0) {
                alert("⚠️ Енергія закінчилася! Зачекай трохи 🎣");
                return;
            }

            score += 2;
            energy -= 1;
            
            scoreEl.textContent = score;
            energyEl.textContent = energy;

            createFloatingText(e.clientX, e.clientY + window.scrollY, '+2');
        });

        function createFloatingText(x, y, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.textContent = text;
            msg.style.left = x + 'px';
            msg.style.top = y + 'px';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1800);
        }

        // Відновлення енергії
        setInterval(() => {
            if (energy < 100) {
                energy = Math.min(100, energy + 1);
                energyEl.textContent = energy;
            }
        }, 3000);

        // Функція перемикання вкладок (поки що тільки тапалка працює)
        function switchTab(tab) {
            if (tab === 0) {
                alert("🎣 Ти вже на вкладці Тапати");
            } else if (tab === 1) {
                alert("👤 Profile\n\nТвій улов: " + score + " РибКоінів\n\nТут пізніше буде статистика, рівень рибалки тощо.");
            } else if (tab === 2) {
                alert("🏆 Rewards\n\nТут будуть завдання, бонуси та нагороди.\n\nПоки в розробці.");
            }
        }

        // Привітання тільки один раз при першому запуску (без "Ласкаво просимо")
        window.onload = () => {
            // Можна прибрати зовсім, якщо не потрібно
        };
    </script>
</body>
</html>
