<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huipizfksn Market</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; --shelf: #2d3748; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 100px; }
        .tab-content { display: none; flex-direction: column; align-items: center; padding: 15px; }
        .active { display: flex; }
        
        /* СТИЛЬ ПОЛИЧОК ІНВЕНТАРЯ */
        .shelf-container { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            background: #3e2723; padding: 15px; border-radius: 10px; 
            border-bottom: 8px solid #2d1b18; width: 100%; box-sizing: border-box;
        }
        .fish-slot { 
            background: var(--card); height: 90px; border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 2px solid #5d4037; position: relative; font-size: 10px;
        }
        
        /* СТИЛЬ ПОЛИЧОК МАРКЕТУ (ДОВШІ) */
        .market-shelf {
            display: flex; flex-direction: column; gap: 12px; width: 100%;
        }
        .market-slot {
            background: #2d3748; border-bottom: 4px solid #1a202c;
            padding: 15px; border-radius: 10px; display: flex; 
            justify-content: space-between; align-items: center;
        }

        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e293b; padding-bottom: 20px; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #94a3b8; font-size: 10px; }
        .active-nav { color: var(--primary); font-weight: bold; }
        
        .btn-small { background: var(--primary); border: none; color: white; padding: 5px; border-radius: 4px; font-size: 10px; margin-top: 5px; }
        .input-box { background: #1e293b; border: 1px solid #334155; color: white; padding: 10px; border-radius: 10px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="fishing" class="tab-content active">
        <h2 style="color:var(--primary)">Huipizfksn Bot</h2>
        <div id="status">Ready to fish?</div>
        <button onclick="handleFishing()" id="fish-btn" style="width:200px; height:200px; border-radius:50%; border:none; background:radial-gradient(#00d2ff, #3a7bd5); color:white; font-weight:bold; margin:20px;">PUSH</button>
    </div>

    <div id="inventory-tab" class="tab-content">
        <h3>MY SHELVES</h3>
        <div id="inv-grid" class="shelf-container"></div>
    </div>

    <div id="market-tab" class="tab-content" style="width:100%; box-sizing:border-box;">
        <h3>GLOBAL MARKET</h3>
        <div id="market-list" class="market-shelf"></div>
    </div>

    <div id="profile" class="tab-content">
        <h3>FISHERMAN INFO</h3>
        <div style="background:var(--card); padding:15px; border-radius:15px; width:100%;">
            <p>🆔 ID: <span id="u-id" style="color:var(--primary)">0</span></p>
            <p>💰 Balance: <span id="balance" style="color:var(--primary)">0</span></p>
            <p>👥 Referrals: <span id="refs" style="color:var(--primary)">0</span></p>
            <hr border="0.5" color="#334155">
            <small>Your link:</small>
            <input id="ref-link" readonly class="input-box" style="font-size:10px;">
        </div>
        
        <div style="margin-top:20px; width:100%;">
            <input id="promo-code" placeholder="Enter Promo" class="input-box">
            <button onclick="applyPromo()" class="btn-small" style="width:100%; height:40px; font-size:14px;">Apply Code</button>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="tab('fishing', this)">LAKE</div>
        <div class="nav-item" onclick="tab('inventory-tab', this); loadInventory();">SHELF</div>
        <div class="nav-item" onclick="tab('market-tab', this); loadMarket();">MARKET</div>
        <div class="nav-item" onclick="tab('profile', this)">USER</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const UID = String(tg.initDataUnsafe?.user?.id || "000000");
        let coins = 0, userInventory = [];

        async function load() {
            const r = await fetch(`/api/get_user?user_id=${UID}`);
            const d = await r.json();
            if(!d.error) {
                coins = d.coins;
                userInventory = d.inventory || [];
                document.getElementById('balance').innerText = coins;
                document.getElementById('u-id').innerText = UID;
                document.getElementById('refs').innerText = d.referrals || 0;
                document.getElementById('ref-link').value = `https://t.me/Huipizfksnbot?start=${UID}`;
            }
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        async function handleFishing() {
            const res = await fetch('/api/get_user?user_id=' + UID); // Simple check
            const item = {id: "fish_" + (Math.floor(Math.random()*3)+1)};
            userInventory.push(item);
            await fetch('/api/add_to_inventory', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: UID, item_id: item.id})
            });
            alert("Caught: " + item.id);
            load();
        }

        function loadInventory() {
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = "";
            userInventory.forEach((item, idx) => {
                grid.innerHTML += `
                    <div class="fish-slot">
                        <b>${item.id}</b>
                        <button class="btn-small" onclick="sellItem('${item.id}', ${idx})">SELL</button>
                    </div>`;
            });
        }

        async function sellItem(id, idx) {
            const pr = prompt("Set Price:");
            if(!pr) return;
            const r = await fetch('/api/list_item', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, item_id: id, price: pr})});
            if((await r.json()).ok) { userInventory.splice(idx,1); loadInventory(); }
        }

        async function loadMarket() {
            const list = document.getElementById('market-list');
            const r = await fetch('/api/get_market');
            const lots = await r.json();
            list.innerHTML = "";
            lots.forEach(lot => {
                list.innerHTML += `
                    <div class="market-slot">
                        <div><b>${lot.item_id}</b><br><small>Seller: ${lot.seller_name}</small></div>
                        <div style="text-align:right">
                            <b style="color:var(--primary)">${lot.price} 💰</b><br>
                            <button class="btn-small" onclick='buyItem(${JSON.stringify(lot)})'>BUY</button>
                        </div>
                    </div>`;
            });
        }

        async function buyItem(lot) {
            const r = await fetch('/api/buy_item', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, lot: lot})});
            const d = await r.json();
            if(d.ok) { alert("Bought!"); load(); loadMarket(); } else alert(d.msg);
        }

        async function applyPromo() {
            const code = document.getElementById('promo-code').value;
            const r = await fetch('/api/use_promo', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, code: code})});
            const d = await r.json();
            if(d.ok) { alert("Success!"); load(); } else alert(d.msg);
        }

        tg.expand();
        load();
    </script>
</body>
</html>
