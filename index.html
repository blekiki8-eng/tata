<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рибалка Віті</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #0a3d62, #1e90ff);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            padding: 20px;
        }
        #tap-area {
            width: 260px;
            height: 260px;
            margin: 30px auto;
            background: radial-gradient(circle, #ffeb3b, #ff9800);
            border-radius: 50%;           /* Кругла тапалка */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 120px;
            cursor: pointer;
            transition: transform 0.08s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            user-select: none;
        }
        #tap-area:active {
            transform: scale(0.88);
        }
        .score {
            font-size: 32px;
            margin: 15px 0;
            font-weight: bold;
        }
        .energy {
            font-size: 24px;
            margin: 10px 0;
        }
        button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 14px 28px;
            margin: 10px 5px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
        }
        .message {
            position: absolute;
            font-size: 26px;
            color: #ffeb3b;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 1.8s forwards;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-140px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎣 Рибалка Віті</h1>
        
        <div class="score">Улов: <span id="score">0</span> РибКоінів</div>
        <div class="energy">Енергія: <span id="energy">100</span>/100</div>
        
        <!-- Кругла тапалка з рибою -->
        <div id="tap-area">🐠</div>
        
        <button onclick="claimDaily()">Щоденний бонус (+500)</button>
        <button onclick="showReferrals()">Запросити друга (+500)</button>
    </div>

    <script>
        let score = 0;
        let energy = 100;

        const scoreEl = document.getElementById('score');
        const energyEl = document.getElementById('energy');
        const tapArea = document.getElementById('tap-area');

        // 1 тап = 2 РибКоіни
        tapArea.addEventListener('click', (e) => {
            if (energy <= 0) {
                alert("⚠️ Енергія закінчилася! Зачекай трохи 🎣");
                return;
            }

            score += 2;      // ← Змінили на 2 FC за тап
            energy -= 1;
            
            scoreEl.textContent = score;
            energyEl.textContent = energy;

            // Анімація +2
            createFloatingText(e.clientX, e.clientY + window.scrollY, '+2');
        });

        function createFloatingText(x, y, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.textContent = text;
            msg.style.left = x + 'px';
            msg.style.top = y + 'px';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1800);
        }

        // Відновлення енергії кожні 3 секунди (+1)
        setInterval(() => {
            if (energy < 100) {
                energy = Math.min(100, energy + 1);
                energyEl.textContent = energy;
            }
        }, 3000);

        function claimDaily() {
            score += 500;
            scoreEl.textContent = score;
            alert('✅ +500 РибКоінів за щоденний вхід!');
        }

        function showReferrals() {
            const refCode = Math.floor(10000 + Math.random() * 90000);
            alert(`🔗 Твоє реферальне посилання:\nhttps://t.me/твій_бот?start=ref${refCode}\n\nЗапроси друга — +500 РибКоінів!`);
            score += 500;
            scoreEl.textContent = score;
        }

        // Привітання
        window.onload = () => {
            alert('🎣 Ласкаво просимо на рибалку!\n\nТапай по круглій рибі 🐠\n1 тап = 2 РибКоіни');
        };
    </script>
</body>
</html>
