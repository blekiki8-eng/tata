<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Huipizfksn Fishing</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; --shelf: #3e2723; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; -webkit-user-select: none; }
        .tab-content { display: none; flex-direction: column; align-items: center; padding: 15px; min-height: 100vh; box-sizing: border-box; }
        .active { display: flex; }
        
        #lake { width: 280px; height: 280px; background: radial-gradient(circle, #00f2fe, #004e92); border-radius: 50%; margin: 20px; border: 4px solid #1e293b; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }
        #poplavok { width: 40px; height: 40px; position: absolute; display: none; transition: all 0.8s ease; }
        .bite { animation: shake 0.3s infinite; }
        @keyframes shake { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }

        .shelf { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--shelf); padding: 15px; border-radius: 10px; width: 100%; box-sizing: border-box; border-bottom: 6px solid #2d1b18; }
        .slot { background: var(--card); padding: 10px; border-radius: 8px; border: 1px solid #5d4037; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        .market-slot { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; width: 100%; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 4px solid #111827; }
        .my-lot { border: 1px solid var(--primary); background: #1e294b; }

        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e293b; padding-bottom: 20px; border-top: 1px solid #334155; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 15px; color: #94a3b8; font-size: 10px; font-weight: bold; }
        .active-nav { color: var(--primary); }
        
        .main-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; font-size: 16px; width: 80%; }
        .btn-sml { border: none; color: white; padding: 6px; border-radius: 6px; font-size: 9px; margin-top: 4px; width: 100%; font-weight: bold; }
        .bg-green { background: #10b981; }
        .bg-orange { background: #f59e0b; }
        .bg-blue { background: #3b82f6; }
        .input-box { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-top: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="fishing-tab" class="tab-content active">
        <h2 data-lang="nav_lake">LAKE</h2>
        <div id="lake"><img src="poplavok.png" id="poplavok"></div>
        <div id="status" data-lang="ready" style="margin-bottom: 20px; color: #94a3b8;">Ready?</div>
        <button id="action-btn" class="main-btn" onclick="startFishing()">CAST ROD</button>
    </div>

    <div id="inventory-tab" class="tab-content">
        <h2 data-lang="nav_inv">SHELVES</h2>
        <div id="inv-grid" class="shelf"></div>
    </div>

    <div id="market-tab" class="tab-content" style="width:100%; box-sizing:border-box;">
        <h2 data-lang="nav_market">MARKET</h2>
        <div id="market-list" style="width:100%"></div>
    </div>

    <div id="profile-tab" class="tab-content">
        <h2 data-lang="nav_prof">USER</h2>
        <div style="background:var(--card); padding:20px; border-radius:15px; width:100%; box-sizing:border-box; border: 1px solid #334155;">
            <p>💰 <span data-lang="balance">Balance</span>: <b id="balance" style="color:var(--primary); font-size: 18px;">0</b></p>
            <p>🆔 ID: <b id="u-id">0</b></p>
            <p>👥 Refs: <b id="refs">0</b></p>
            <small>Ref Link:</small>
            <input id="ref-link" readonly class="input-box" style="font-size:10px; color: #94a3b8;">
            <hr color="#334155" style="margin:20px 0">
            <label data-lang="nav_prof">Language</label>
            <select onchange="changeLang(this.value)" id="lang-sel" class="input-box">
                <option value="en">English</option>
                <option value="uk">Українська</option>
            </select>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active-nav" onclick="tab('fishing-tab', this)" data-lang="nav_lake">LAKE</div>
        <div class="nav-item" onclick="tab('inventory-tab', this); renderInv();" data-lang="nav_inv">SHELF</div>
        <div class="nav-item" onclick="tab('market-tab', this); loadMarket();" data-lang="nav_market">MARKET</div>
        <div class="nav-item" onclick="tab('profile-tab', this)" data-lang="nav_prof">USER</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const UID = String(tg.initDataUnsafe?.user?.id || "000000");
        let coins = 0, inv = [], lang = 'en', isFishing = false;

        const i18n = {
            en: { cast: "CAST ROD", pull: "CATCH!", ready: "Ready?", wait: "Wait...", bite: "BITE!", fish_1: "Carp", fish_2: "Perch", fish_3: "Goldfish", balance: "Balance", nav_lake: "LAKE", nav_inv: "SHELVES", nav_market: "MARKET", nav_prof: "USER", btn_market: "Market", btn_system: "System", seller_me: "YOU" },
            uk: { cast: "ЗАКИНУТИ", pull: "ТЯГНИ!", ready: "Готовий?", wait: "Чекай...", bite: "КЛЮЄ!", fish_1: "Карась", fish_2: "Окунь", fish_3: "Золота рибка", balance: "Баланс", nav_lake: "ОЗЕРО", nav_inv: "ПОЛИЧКИ", nav_market: "РИНОК", nav_prof: "ПРОФІЛЬ", btn_market: "Ринок", btn_system: "Продати", seller_me: "ВИ" }
        };

        const SYS_PRICES = {"fish_1": 10, "fish_2": 25, "fish_3": 150};

        async function load() {
            const r = await fetch(`/api/get_user?user_id=${UID}`);
            const d = await r.json();
            if(!d.error) {
                coins = d.coins; inv = d.inventory || []; lang = d.lang || 'en';
                document.getElementById('balance').innerText = coins;
                document.getElementById('u-id').innerText = UID;
                document.getElementById('refs').innerText = d.referrals || 0;
                document.getElementById('ref-link').value = `https://t.me/Huipizfksnbot?start=${UID}`;
                document.getElementById('lang-sel').value = lang;
                updateUI();
            }
        }

        function updateUI() {
            const t = i18n[lang];
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.getAttribute('data-lang');
                if(t[key]) el.innerText = t[key];
            });
            document.getElementById('action-btn').innerText = isFishing ? t.pull : t.cast;
        }

        function tab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            el.classList.add('active-nav');
            updateUI();
        }

        function startFishing() {
            const btn = document.getElementById('action-btn'), p = document.getElementById('poplavok'), st = document.getElementById('status'), t = i18n[lang];
            if (!isFishing) {
                isFishing = true; btn.innerText = t.pull; btn.disabled = true; st.innerText = t.wait;
                p.style.display = "block"; p.classList.remove("bite");
                let m = 0;
                const mi = setInterval(() => {
                    p.style.left = Math.random()*240+"px"; p.style.top = Math.random()*240+"px";
                    if (++m >= 3) { clearInterval(mi); p.classList.add("bite"); st.innerText = t.bite; btn.disabled = false; tg.HapticFeedback.notificationOccurred('success'); }
                }, 800);
            } else {
                isFishing = false; p.style.display = "none";
                const fId = "fish_" + (Math.floor(Math.random()*3)+1);
                inv.push({id: fId}); st.innerText = t[fId]; updateUI();
                fetch('/api/save_user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, inventory: inv}) });
            }
        }

        function renderInv() {
            const grid = document.getElementById('inv-grid'); grid.innerHTML = "";
            const t = i18n[lang];
            inv.forEach((item, idx) => {
                const sysPrice = SYS_PRICES[item.id] || 5;
                grid.innerHTML += `<div class="slot">
                    <b style="font-size:10px">${t[item.id]}</b>
                    <button class="btn-sml bg-orange" onclick="listMarket('${item.id}', ${idx})">${t.btn_market}</button>
                    <button class="btn-sml bg-green" onclick="sellSystem('${item.id}', ${idx})">${t.btn_system} (${sysPrice})</button>
                </div>`;
            });
        }

        async function sellSystem(id, idx) {
            const r = await fetch('/api/sell_system', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, item_id: id}) });
            const d = await r.json();
            if(d.ok) { inv.splice(idx,1); renderInv(); coins = d.new_balance; document.getElementById('balance').innerText = coins; }
        }

        async function listMarket(id, idx) {
            const pr = prompt(lang === 'uk' ? "Введіть ціну:" : "Enter price:");
            if(!pr || isNaN(pr)) return;
            const r = await fetch('/api/list_item', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, item_id: id, price: pr}) });
            if((await r.json()).ok) { inv.splice(idx,1); renderInv(); }
        }

        async function loadMarket() {
            const list = document.getElementById('market-list');
            const r = await fetch('/api/get_market');
            const lots = await r.json();
            const t = i18n[lang];
            list.innerHTML = "";
            lots.forEach(lot => {
                const isMe = lot.seller_id == UID;
                list.innerHTML += `<div class="market-slot ${isMe ? 'my-lot' : ''}">
                    <div><b>${t[lot.item_id]}</b><br><small>${isMe ? t.seller_me : lot.seller_name}</small></div>
                    <div style="text-align:right">
                        <b style="color:var(--primary)">${lot.price} 💰</b><br>
                        ${isMe ? '' : `<button class="btn-sml bg-blue" style="width:60px" onclick='buyItem(${JSON.stringify(lot)})'>BUY</button>`}
                    </div>
                </div>`;
            });
        }

        async function buyItem(lot) {
            const r = await fetch('/api/buy_item', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, lot: lot}) });
            if((await r.json()).ok) { load(); loadMarket(); }
        }

        async function changeLang(v) {
            lang = v; updateUI();
            await fetch('/api/save_user', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: UID, lang: v}) });
        }

        tg.expand(); load();
    </script>
</body>
</html>
