<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Cash Test</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding-bottom: 80px; }
        .tab-content { display: none; flex-direction: column; align-items: center; padding: 20px; }
        .active { display: flex; }
        .stat-card { background: var(--card); border-radius: 15px; padding: 15px; width: 90%; margin-bottom: 10px; }
        .game-btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 30px; width: 90%; font-weight: bold; }
        #lake { width: 200px; height: 200px; background: blue; border-radius: 50%; margin: 20px; position: relative; }
        #my-poplavok { width: 50px; position: absolute; display: none; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1e293b; }
        .nav-item { flex: 1; text-align: center; padding: 20px; font-size: 12px; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 10px; width: 60%; }
    </style>
</head>
<body>

    <div id="profile" class="tab-content">
        <h2>ПРОФІЛЬ</h2>
        <div class="stat-card">
            <p>💰 Баланс: <span id="balance">0</span></p>
        </div>
        <div class="stat-card">
            <h3>ПРОМОКОД</h3>
            <input type="text" id="promo-input" placeholder="Код...">
            <button onclick="applyPromo()" style="padding: 10px; border-radius: 10px; background: var(--primary); border: none; color: white;">OK</button>
            <div id="promo-msg" style="margin-top: 5px; font-size: 12px;"></div>
        </div>
    </div>

    <div id="fishing" class="tab-content active">
        <h2>ОЗЕРО</h2>
        <div id="lake"><img src="poplavok.png" id="my-poplavok"></div>
        <div id="status">Готовий?</div>
        <button id="action-btn" class="game-btn" onclick="handleAction()">ЗАКИНУТИ</button>
    </div>

    <div class="nav">
        <div class="nav-item" onclick="tab('profile')">ПРОФІЛЬ</div>
        <div class="nav-item" onclick="tab('fishing')">ОЗЕРО</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const UID = String(tg.initDataUnsafe?.user?.id || "000000");
        let coins = 0, isFishing = false, canPull = false;

        async function load() {
            const r = await fetch(`/api/get_balance?user_id=${UID}`);
            const d = await r.json();
            if(!d.error) { coins = d.coins; document.getElementById('balance').innerText = coins; }
        }

        async function applyPromo() {
            const code = document.getElementById('promo-input').value;
            const r = await fetch('/api/use_promo', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: UID, code: code })
            });
            const d = await r.json();
            const msg = document.getElementById('promo-msg');
            if(d.ok) {
                coins += d.bonus;
                document.getElementById('balance').innerText = coins;
                msg.innerText = "Успішно! + " + d.bonus;
                msg.style.color = "green";
            } else {
                msg.innerText = d.message;
                msg.style.color = "red";
            }
        }

        function handleAction() {
            const btn = document.getElementById('action-btn');
            const pop = document.getElementById('my-poplavok');
            if(!isFishing) {
                isFishing = true; btn.innerText = "ЧЕКАЙ...";
                pop.style.display = "block";
                setTimeout(() => { canPull = true; btn.innerText = "ТЯГНИ!"; }, 3000);
            } else if(canPull) {
                isFishing = false; canPull = false;
                pop.style.display = "none";
                coins += 10; document.getElementById('balance').innerText = coins;
                btn.innerText = "ЗАКИНУТИ";
                fetch('/api/save_balance', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: UID, coins: coins })
                });
            }
        }

        function tab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        tg.expand();
        load();
    </script>
</body>
</html>
